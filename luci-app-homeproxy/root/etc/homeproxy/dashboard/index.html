<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="color-scheme" content="light dark" />
    <!-- Chrome tint for browsers that still honor theme-color (Chrome, Safari
         15–18); must match --surface in global.css (the topbar color). Static
         media variants so the right one applies before JS runs. iOS 26 Safari
         ignores these and samples #statusbar-tint instead. -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f0f0f0" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#181818" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="sing-box" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script>
      // Resolve the theme before first paint: iOS Safari samples the canvas
      // color for its chrome early, and a light-first paint would stick.
      // Must mirror applyTheme() in src/app/context.tsx.
      (function () {
        var dark = false;
        try {
          var stored = localStorage.getItem("sing-box-dashboard.theme");
          dark =
            stored === "dark" ||
            (stored !== "light" && matchMedia("(prefers-color-scheme: dark)").matches);
        } catch (e) {}
        document.documentElement.dataset.theme = dark ? "dark" : "light";
      })();
      // Apply the saved accent before first paint so accent-colored controls
      // don't flash monochrome. Must mirror applyAccent() in
      // src/app/context.tsx (storage key, preset names, custom-color vars).
      (function () {
        try {
          var accent = localStorage.getItem("sing-box-dashboard.accent");
          if (!accent) {
            return;
          }
          var presets = ["blue", "purple", "pink", "red", "orange", "yellow", "green", "graphite"];
          if (presets.indexOf(accent) !== -1) {
            document.documentElement.dataset.accent = accent;
          } else if (/^#[0-9a-f]{6}$/.test(accent)) {
            var lin = function (i) {
              var c = parseInt(accent.slice(1 + i * 2, 3 + i * 2), 16) / 255;
              return c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
            };
            var luminance = 0.2126 * lin(0) + 0.7152 * lin(1) + 0.0722 * lin(2);
            document.documentElement.dataset.accent = "custom";
            document.documentElement.style.setProperty("--custom-accent", accent);
            document.documentElement.style.setProperty(
              "--on-accent",
              luminance > 0.45 ? "#1a1a1a" : "#ffffff"
            );
          }
        } catch (e) {}
      })();
      // Resolve the language before first paint so Farsi gets dir="rtl"
      // without a layout flash. Must mirror detectSystemLanguage() in
      // src/app/i18n.tsx (storage key and tag mapping).
      (function () {
        var lang = "en";
        try {
          var stored = localStorage.getItem("sing-box-dashboard.language");
          var known = ["en", "zh-Hans", "zh-Hant", "fa", "ru"];
          if (known.indexOf(stored) !== -1) {
            lang = stored;
          } else {
            var tags = navigator.languages || [navigator.language];
            for (var i = 0; i < tags.length; i++) {
              var tag = String(tags[i]).toLowerCase();
              if (tag.indexOf("zh") === 0) {
                lang = /hant|tw|hk|mo/.test(tag) ? "zh-Hant" : "zh-Hans";
                break;
              }
              if (tag.indexOf("fa") === 0) {
                lang = "fa";
                break;
              }
              if (tag.indexOf("ru") === 0) {
                lang = "ru";
                break;
              }
              if (tag.indexOf("en") === 0) {
                break;
              }
            }
          }
        } catch (e) {}
        document.documentElement.lang = lang;
        document.documentElement.dir = lang === "fa" ? "rtl" : "ltr";
      })();
    </script>

    <div id="statusbar-tint" class="statusbar-tint" aria-hidden="true"></div>
