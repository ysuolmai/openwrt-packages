name: Publish MoonTVPlus core

on:
  workflow_run:
    workflows: [Build IPQ60XX packages]
    types: [completed]

permissions:
  actions: read
  contents: write

concurrency:
  group: moontvplus-core-release
  cancel-in-progress: false

env:
  CORE_RELEASE_TAG: moontvplus-core
  SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve source build
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          source_sha="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$SOURCE_RUN_ID" --jq .head_sha)"
          test -n "$source_sha"
          echo "SOURCE_SHA=$source_sha" >> "$GITHUB_ENV"

      - name: Download source artifacts
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ env.SOURCE_RUN_ID }}
          path: artifacts

      - name: Collect and verify core assets
        id: core_assets
        run: |
          mkdir -p core-release
          find artifacts -type f -name 'moontvplus-core_*.tar.gz' \
            -exec cp -f {} core-release/ \;
          find artifacts -type f -name 'moontvplus-core_*.tar.gz.sha256' \
            -exec cp -f {} core-release/ \;
          find artifacts -type f -name 'moontvplus-jassub-font_*.ttc' \
            -exec cp -f {} core-release/ \;
          find artifacts -type f -name 'moontvplus-jassub-font_*.ttc.sha256' \
            -exec cp -f {} core-release/ \;
          core_asset="$(find core-release -type f -name 'moontvplus-core_*.tar.gz' -print -quit)"
          font_asset="$(find core-release -type f -name 'moontvplus-jassub-font_*.ttc' -print -quit)"
          if [ -z "$core_asset" ] || [ -z "$font_asset" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "No MoonTVPlus core assets in source run; nothing to publish."
            exit 0
          fi
          cd core-release
          for asset in moontvplus-core_*.tar.gz moontvplus-jassub-font_*.ttc; do
            test -f "$asset.sha256" || {
              echo "Missing checksum for $asset" >&2
              exit 1
            }
          done
          for checksum in *.sha256; do
            sha256sum -c "$checksum"
          done
          find . -maxdepth 1 -type f -printf '%f\n' | sort >../current-assets.txt
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Publish dedicated core release
        if: steps.core_assets.outputs.available == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.CORE_RELEASE_TAG }}
          name: MoonTVPlus OpenWrt Core
          make_latest: false
          overwrite_files: true
          body: |
            Stable update channel for the MoonTVPlus OpenWrt runtime.

            Target: qualcommax / ipq60xx
            Package collection commit: ${{ env.SOURCE_SHA }}
            Source workflow run: ${{ env.SOURCE_RUN_ID }}

            The application core and optional JASSUB CJK font are downloaded
            on demand by luci-app-moontvplus. Every asset has a matching SHA256
            file and the updater also validates architecture and Node ABI.
          files: core-release/*

      - name: Remove obsolete core assets
        if: steps.core_assets.outputs.available == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_id="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$CORE_RELEASE_TAG" --jq .id)"
          gh api "repos/$GITHUB_REPOSITORY/releases/$release_id/assets" --paginate \
            --jq '.[] | "\(.id) \(.name)"' |
          while read -r asset_id asset_name; do
            grep -Fxq "$asset_name" current-assets.txt ||
              gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id"
          done
