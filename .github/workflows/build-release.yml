name: Build IPQ60XX packages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      package:
        description: Package source directory to build
        required: true
        default: all
        type: choice
        options:
          - all
          - frp
          - luci-app-frpc
          - luci-app-frps
          - ddns-go
          - luci-app-ddns-go
          - luci-app-adguardhome
          - luci-theme-shadcn
          - sing-box
          - luci-app-homeproxy
          - moontvplus
          - luci-app-moontvplus
      format:
        description: Package format to build
        required: true
        default: ipk
        type: choice
        options:
          - ipk
          - apk
          - both

permissions:
  contents: write

env:
  OPENWRT_CI_REPO: https://github.com/ysuolmai/OpenWRT-CI.git
  OPENWRT_CI_BRANCH: main
  OPENWRT_REPO: https://github.com/VIKINGYFY/immortalwrt.git
  OPENWRT_BRANCH: main
  OPENWRT_CONFIG: IPQ60XX-WIFI-YES
  COLLECTION_PATHS: >-
    frp luci-app-frpc luci-app-frps ddns-go luci-app-ddns-go
    luci-app-adguardhome luci-theme-shadcn sing-box luci-app-homeproxy
    moontvplus luci-app-moontvplus
  SELECTED_PACKAGE: ${{ inputs.package || 'all' }}
  BUILD_FORMAT: ${{ inputs.format || 'ipk' }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        package: ${{ (inputs.package || 'all') == 'all' && fromJSON('["frp","luci-app-frpc","luci-app-frps","ddns-go","luci-app-ddns-go","luci-app-adguardhome","luci-theme-shadcn","sing-box","luci-app-homeproxy","moontvplus","luci-app-moontvplus"]') || fromJSON(format('["{0}"]', inputs.package)) }}
        format: ${{ (inputs.format || 'ipk') == 'both' && fromJSON('["ipk","apk"]') || fromJSON(format('["{0}"]', inputs.format || 'ipk')) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 350
    env:
      SELECTED_PACKAGE: ${{ matrix.package }}
      BUILD_FORMAT: ${{ matrix.format }}
    steps:
      - name: Checkout package collection
        uses: actions/checkout@v4

      - name: Select packages to build
        run: |
          case "$SELECTED_PACKAGE" in
            all)
              build_paths="$COLLECTION_PATHS"
              expected_packages="frpc frps luci-app-frpc luci-app-frps ddns-go \
                luci-app-ddns-go luci-app-adguardhome luci-theme-shadcn sing-box \
                luci-app-homeproxy moontvplus luci-app-moontvplus"
              ;;
            frp)
              build_paths=frp
              expected_packages="frpc frps"
              ;;
            luci-app-frpc|luci-app-frps|ddns-go|luci-app-ddns-go|\
            luci-app-adguardhome|luci-theme-shadcn|sing-box|\
            luci-app-homeproxy|moontvplus|luci-app-moontvplus)
              build_paths="$SELECTED_PACKAGE"
              expected_packages="$SELECTED_PACKAGE"
              ;;
            *)
              echo "Unsupported package: $SELECTED_PACKAGE" >&2
              exit 1
              ;;
          esac
          echo "BUILD_PATHS=$build_paths" >> "$GITHUB_ENV"
          echo "EXPECTED_PACKAGES=$expected_packages" >> "$GITHUB_ENV"
          if [ "$SELECTED_PACKAGE" = moontvplus ] && [ "$BUILD_FORMAT" = ipk ]; then
            echo "BUILD_MOONTV_CORE=1" >> "$GITHUB_ENV"
          else
            echo "BUILD_MOONTV_CORE=0" >> "$GITHUB_ENV"
          fi

      - name: Prepare build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo apt-get update
          sudo apt-get install -y dos2unix libfuse-dev
          sudo bash -c 'bash <(curl -fsSL https://build-scripts.immortalwrt.org/init_build_environment.sh)'

      - name: Checkout OpenWRT-CI configuration
        uses: actions/checkout@v4
        with:
          repository: ysuolmai/OpenWRT-CI
          ref: main
          path: ci

      - name: Clone ImmortalWrt and install feeds
        run: |
          git clone --depth=1 --single-branch --branch "$OPENWRT_BRANCH" \
            "$OPENWRT_REPO" wrt
          echo "OPENWRT_HASH=$(git -C wrt rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Restore OpenWrt toolchain cache
        uses: actions/cache@v4
        with:
          key: ${{ env.OPENWRT_CONFIG }}-${{ env.OPENWRT_BRANCH }}-toolchain-v1
          restore-keys: |
            ${{ env.OPENWRT_CONFIG }}-${{ env.OPENWRT_BRANCH }}-toolchain-
          path: |
            wrt/.ccache
            wrt/build_dir/host*
            wrt/build_dir/toolchain-*
            wrt/staging_dir/host*
            wrt/staging_dir/toolchain-*

      - name: Install feeds
        run: |
          cd wrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Remove conflicting packages and add this collection
        run: |
          for package in $COLLECTION_PATHS; do
            find wrt/package -mindepth 2 -maxdepth 5 \
              \( -type d -o -type l \) -name "$package" -prune \
              -exec rm -rf -- {} +
          done
          mkdir -p wrt/package/ysuolmai
          for package in $COLLECTION_PATHS; do
            cp -a "$package" "wrt/package/ysuolmai/$package"
          done

      - name: Configure IPQ60XX package build
        run: |
          cd wrt
          cat "$GITHUB_WORKSPACE/ci/Config/$OPENWRT_CONFIG.txt" > .config
          cat >> .config <<'EOF'
          CONFIG_PACKAGE_luci=y
          CONFIG_LUCI_LANG_zh_Hans=y
          CONFIG_PACKAGE_luci-theme-shadcn=y
          CONFIG_PACKAGE_frpc=y
          CONFIG_PACKAGE_frps=y
          CONFIG_PACKAGE_ddns-go=y
          CONFIG_PACKAGE_luci-app-frpc=y
          CONFIG_PACKAGE_luci-app-frps=y
          CONFIG_PACKAGE_luci-app-ddns-go=y
          CONFIG_PACKAGE_luci-app-adguardhome=y
          CONFIG_PACKAGE_luci-theme-shadcn=y
          CONFIG_PACKAGE_sing-box=y
          CONFIG_PACKAGE_luci-app-homeproxy=y
          CONFIG_PACKAGE_moontvplus=y
          CONFIG_PACKAGE_luci-app-moontvplus=y
          CONFIG_USE_APK=n
          EOF
          if [ "$BUILD_MOONTV_CORE" = 1 ]; then
            # The core archive bundles the target Node runtime, so stage the
            # target package for extraction without making it a firmware dep.
            echo 'CONFIG_PACKAGE_node=y' >> .config
          fi
          make defconfig

      - name: Build target toolchain
        run: |
          cd wrt
          make toolchain/install -j"$(nproc)" || make toolchain/install -j1 V=s

      - name: Build target kernel
        run: |
          cd wrt
          make target/linux/compile -j"$(nproc)" || make target/linux/compile -j1 V=s

      - name: Save OpenWrt toolchain cache
        if: always()
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          key: ${{ env.OPENWRT_CONFIG }}-${{ env.OPENWRT_BRANCH }}-toolchain-v1
          path: |
            wrt/.ccache
            wrt/build_dir/host*
            wrt/build_dir/toolchain-*
            wrt/staging_dir/host*
            wrt/staging_dir/toolchain-*

      - name: Build MoonTVPlus host tools
        if: matrix.package == 'moontvplus' && matrix.format == 'ipk'
        run: |
          cd wrt
          # Direct package targets do not reliably expand host build
          # dependencies, so stage Node, node-gyp and pnpm explicitly.
          make package/feeds/packages/node/host-compile -j1 V=s
          make package/feeds/packages/node-gyp/host-compile -j1 V=s
          make package/feeds/packages/node-pnpm/host-compile -j1 V=s
          test -x staging_dir/hostpkg/bin/node
          test -x staging_dir/hostpkg/bin/node-gyp
          test -x staging_dir/hostpkg/bin/pnpm

      - name: Build IPK package
        if: matrix.format == 'ipk'
        run: |
          cd wrt
          mkdir -p "$GITHUB_WORKSPACE/release"
          failures="$RUNNER_TEMP/ipk-build-failures.txt"
          : > "$failures"
          for package in $BUILD_PATHS; do
            case "$package" in
              moontvplus)
                echo "Building $package core with top-level -j1"
                build_status=0
                make "package/ysuolmai/$package/compile" \
                  MOONTVPLUS_BUILD_CORE=1 -j1 V=s || build_status=$?
                ;;
              luci-app-moontvplus)
                echo "Building lightweight $package with top-level -j1"
                build_status=0
                make "package/ysuolmai/$package/compile" -j1 || build_status=$?
                ;;
              *)
                build_status=0
                make "package/ysuolmai/$package/compile" -j"$(nproc)" V=s || build_status=$?
                ;;
            esac
            if [ "$build_status" -ne 0 ]; then
              printf '%s\n' "$package" >> "$failures"
            fi
          done
          if [ -s "$failures" ]; then
            echo "IPK builds failed:"
            cat "$failures"
            exit 1
          fi
          find bin/packages -type f -name '*.ipk' \
            -exec cp -f {} "$GITHUB_WORKSPACE/release/" \;

      - name: Build APK package
        if: matrix.format == 'apk'
        run: |
          cd wrt
          mkdir -p "$GITHUB_WORKSPACE/release"
          sed -i '/^CONFIG_USE_APK=/d' .config
          echo 'CONFIG_USE_APK=y' >> .config
          make defconfig
          failures="$RUNNER_TEMP/apk-build-failures.txt"
          : > "$failures"
          for package in $BUILD_PATHS; do
            make "package/ysuolmai/$package/clean"
            case "$package" in
              moontvplus|luci-app-moontvplus)
                echo "Building $package with top-level -j1"
                build_status=0
                make "package/ysuolmai/$package/compile" -j1 || build_status=$?
                ;;
              *)
                build_status=0
                make "package/ysuolmai/$package/compile" -j"$(nproc)" V=s || build_status=$?
                ;;
            esac
            if [ "$build_status" -ne 0 ]; then
              printf '%s\n' "$package" >> "$failures"
            fi
          done
          if [ -s "$failures" ]; then
            echo "APK builds failed:"
            cat "$failures"
            exit 1
          fi
          find bin/packages -type f -name '*.apk' \
            -exec cp -f {} "$GITHUB_WORKSPACE/release/" \;

      - name: Collect MoonTVPlus runtime assets
        if: env.BUILD_MOONTV_CORE == '1'
        run: |
          mkdir -p core-release
          find wrt/build_dir -type f -path '*/.openwrt-artifacts/moontvplus-core_*.tar.gz' \
            -exec cp -f {} core-release/ \;
          find wrt/build_dir -type f -path '*/.openwrt-artifacts/moontvplus-jassub-font_*.ttc' \
            -exec cp -f {} core-release/ \;
          test -n "$(find core-release -maxdepth 1 -type f -name 'moontvplus-core_*.tar.gz' -print -quit)" || {
            echo "Missing MoonTVPlus core archive" >&2
            exit 1
          }
          test -n "$(find core-release -maxdepth 1 -type f -name 'moontvplus-jassub-font_*.ttc' -print -quit)" || {
            echo "Missing MoonTVPlus optional font" >&2
            exit 1
          }
          cd core-release
          for asset in moontvplus-core_*.tar.gz moontvplus-jassub-font_*.ttc; do
            sha256sum "$asset" >"$asset.sha256"
          done

      - name: Verify package output
        run: |
          for package in $EXPECTED_PACKAGES; do
            if [ "$BUILD_FORMAT" = both ] || [ "$BUILD_FORMAT" = ipk ]; then
              test -n "$(find release -maxdepth 1 -type f -name "${package}_*.ipk" -print -quit)" || {
                echo "Missing IPK output for $package" >&2
                exit 1
              }
            fi
            if [ "$BUILD_FORMAT" = both ] || [ "$BUILD_FORMAT" = apk ]; then
              test -n "$(find release -maxdepth 1 -type f -name "${package}-*.apk" -print -quit)" || {
                echo "Missing APK output for $package" >&2
                exit 1
              }
            fi
          done

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.package }}-${{ matrix.format }}-${{ github.run_number }}
          path: release/*
          if-no-files-found: error

      - name: Upload MoonTVPlus core artifacts
        if: matrix.package == 'moontvplus' && matrix.format == 'ipk'
        uses: actions/upload-artifact@v4
        with:
          name: moontvplus-core-${{ github.run_id }}
          path: core-release/*
          if-no-files-found: error

  release:
    needs: build
    if: (inputs.package || 'all') == 'all'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: packages-*
          path: release
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: packages-ipq60xx-${{ inputs.format || 'ipk' }}-${{ github.run_number }}
          name: IPQ60XX packages (${{ inputs.format || 'ipk' }}) ${{ github.run_number }}
          generate_release_notes: true
          body: |
            Target: qualcommax / ipq60xx
            Source: ${{ env.OPENWRT_REPO }} (${{ env.OPENWRT_BRANCH }})
            Package collection commit: ${{ github.sha }}

            MoonTVPlus runtime assets are maintained separately in the
            `moontvplus-core` release.
          files: release/*
